<svg xmlns="http://www.w3.org/2000/svg" width="800" height="180" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
  </defs>

  <rect width="800" height="180" fill="url(#abg)" rx="12"/>

  <!--
    Tetrahedron vertices (2D projection):
      A = (55, 22)   top/apex        → #e63946
      B = (12, 98)   bottom-left     → #2a9d8f
      C = (98, 78)   right           → #457b9d
      D = (48, 58)   inner/back      → #f0932b
  -->

  <!-- ═══ Stage 1: Seeds ═══ -->
  <g transform="translate(15, 18)">
    <text x="55" y="10" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle" font-weight="600" letter-spacing="0.5">SEEDS</text>
    <circle cx="55" cy="32" r="9" fill="#e63946"/>
    <circle cx="12" cy="98" r="9" fill="#2a9d8f"/>
    <circle cx="98" cy="78" r="9" fill="#457b9d"/>
    <circle cx="48" cy="62" r="9" fill="#f0932b"/>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(120, 62)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#484f58" stroke-width="1.5"/>
    <polygon points="24,-4 32,0 24,4" fill="#484f58"/>
  </g>

  <!-- ═══ Stage 2: Radial Lift ═══ -->
  <g transform="translate(155, 18)">
    <text x="55" y="10" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle" font-weight="600" letter-spacing="0.5">RADIAL LIFT</text>
    <!-- Gray axis (L axis = x=55 vertical) -->
    <line x1="55" y1="16" x2="55" y2="110" stroke="#484f58" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>
    <!-- Seeds contracted toward gray axis: low-chroma seeds move closer, high-chroma stay -->
    <!-- A at (55,22) — high chroma, stays near same position -->
    <circle cx="55" cy="22" r="5" fill="#e63946" opacity="0.4"/>
    <circle cx="56" cy="22" r="5" fill="#e63946"/>
    <!-- B at (12,98) — high chroma, stays near -->
    <circle cx="12" cy="98" r="5" fill="#2a9d8f" opacity="0.4"/>
    <circle cx="15" cy="98" r="5" fill="#2a9d8f"/>
    <!-- C at (98,78) — high chroma, stays near -->
    <circle cx="98" cy="78" r="5" fill="#457b9d" opacity="0.4"/>
    <circle cx="95" cy="78" r="5" fill="#457b9d"/>
    <!-- D at (48,58) — lower chroma, contracts toward gray axis -->
    <circle cx="48" cy="58" r="4" fill="#f0932b" opacity="0.4"/>
    <circle cx="51" cy="58" r="5" fill="#f0932b"/>
    <!-- Arrows showing contraction -->
    <text x="55" y="122" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="8" text-anchor="middle" font-style="italic">gray contracts</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(275, 62)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#484f58" stroke-width="1.5"/>
    <polygon points="24,-4 32,0 24,4" fill="#484f58"/>
  </g>

  <!-- ═══ Stage 3: Hull in Lifted Space ═══ -->
  <g transform="translate(312, 18)">
    <text x="55" y="10" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle" font-weight="600" letter-spacing="0.5">HULL (LIFTED)</text>
    <!-- Lifted tetrahedron edges -->
    <line x1="56" y1="22" x2="15" y2="98" stroke="#6e7681" stroke-width="1" opacity="0.5"/>
    <line x1="56" y1="22" x2="95" y2="78" stroke="#6e7681" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="98" x2="95" y2="78" stroke="#6e7681" stroke-width="1" opacity="0.5"/>
    <line x1="56" y1="22" x2="51" y2="58" stroke="#6e7681" stroke-width="0.7" opacity="0.25" stroke-dasharray="4,3"/>
    <line x1="15" y1="98" x2="51" y2="58" stroke="#6e7681" stroke-width="0.7" opacity="0.25" stroke-dasharray="4,3"/>
    <line x1="95" y1="78" x2="51" y2="58" stroke="#6e7681" stroke-width="0.7" opacity="0.25" stroke-dasharray="4,3"/>
    <!-- Seed vertices (lifted positions) -->
    <circle cx="56" cy="22" r="5" fill="#e63946"/>
    <circle cx="15" cy="98" r="5" fill="#2a9d8f"/>
    <circle cx="95" cy="78" r="5" fill="#457b9d"/>
    <circle cx="51" cy="58" r="5" fill="#f0932b"/>
    <!-- Free particles on faces -->
    <circle cx="38" cy="59" r="3" fill="#70927b" opacity="0.8"/>
    <circle cx="67" cy="53" r="3" fill="#a77c68" opacity="0.8"/>
    <circle cx="53" cy="78" r="3" fill="#3b698d" opacity="0.8"/>
    <circle cx="55" cy="66" r="3" fill="#8e616e" opacity="0.8"/>
    <text x="55" y="122" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">flat faces, exact areas</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(432, 62)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#484f58" stroke-width="1.5"/>
    <polygon points="24,-4 32,0 24,4" fill="#484f58"/>
  </g>

  <!-- ═══ Stage 4: Optimize ═══ -->
  <g transform="translate(460, 18)">
    <text x="55" y="10" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle" font-weight="600" letter-spacing="0.5">OPTIMIZE</text>
    <!-- Same lifted tetrahedron -->
    <line x1="56" y1="22" x2="15" y2="98" stroke="#6e7681" stroke-width="0.6" opacity="0.2"/>
    <line x1="56" y1="22" x2="95" y2="78" stroke="#6e7681" stroke-width="0.6" opacity="0.2"/>
    <line x1="15" y1="98" x2="95" y2="78" stroke="#6e7681" stroke-width="0.6" opacity="0.2"/>
    <line x1="56" y1="22" x2="51" y2="58" stroke="#6e7681" stroke-width="0.4" opacity="0.1" stroke-dasharray="4,3"/>
    <line x1="15" y1="98" x2="51" y2="58" stroke="#6e7681" stroke-width="0.4" opacity="0.1" stroke-dasharray="4,3"/>
    <line x1="95" y1="78" x2="51" y2="58" stroke="#6e7681" stroke-width="0.4" opacity="0.1" stroke-dasharray="4,3"/>
    <!-- Seeds stay fixed -->
    <circle cx="56" cy="22" r="4.5" fill="#e63946"/>
    <circle cx="15" cy="98" r="4.5" fill="#2a9d8f"/>
    <circle cx="95" cy="78" r="4.5" fill="#457b9d"/>
    <circle cx="51" cy="58" r="4.5" fill="#f0932b"/>
    <!-- Free particles spread via Euclidean repulsion -->
    <circle cx="31" cy="71" r="3.5" fill="#70927b"/>
    <circle cx="70" cy="55" r="3.5" fill="#a77c68"/>
    <circle cx="58" cy="78" r="3.5" fill="#3b698d"/>
    <circle cx="40" cy="75" r="3.5" fill="#8e616e"/>
    <text x="55" y="122" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="9" text-anchor="middle">Euclidean repulsion</text>
  </g>

  <!-- Arrow 4 -->
  <g transform="translate(582, 62)">
    <line x1="0" y1="0" x2="24" y2="0" stroke="#484f58" stroke-width="1.5"/>
    <polygon points="24,-4 32,0 24,4" fill="#484f58"/>
  </g>

  <!-- ═══ Stage 5: Palette ═══ -->
  <g transform="translate(618, 18)">
    <text x="55" y="10" fill="#8b949e" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle" font-weight="600" letter-spacing="0.5">PALETTE</text>
    <text x="55" y="22" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="7" text-anchor="middle" font-style="italic">inverse lift</text>
    <rect x="25" y="28" width="56" height="11" rx="3" fill="#e63946"/>
    <rect x="25" y="42" width="56" height="11" rx="3" fill="#f0932b"/>
    <rect x="25" y="56" width="56" height="11" rx="3" fill="#a77c68"/>
    <rect x="25" y="70" width="56" height="11" rx="3" fill="#8e616e"/>
    <rect x="25" y="84" width="56" height="11" rx="3" fill="#70927b"/>
    <rect x="25" y="98" width="56" height="11" rx="3" fill="#3b698d"/>
    <rect x="25" y="112" width="56" height="11" rx="3" fill="#2a9d8f"/>
    <rect x="25" y="126" width="56" height="11" rx="3" fill="#457b9d"/>
  </g>

  <!-- Bottom description -->
  <text x="400" y="170" fill="#484f58" font-family="system-ui, -apple-system, sans-serif" font-size="10" text-anchor="middle">The lift defines the family. The convexity preserves the vividness. Plain physics distributes the colors.</text>
</svg>
